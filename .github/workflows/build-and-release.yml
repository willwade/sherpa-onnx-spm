name: Build and Release XCFrameworks

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      sherpa_onnx_version:
        description: 'Target version to build (e.g. 1.12.38). Leave empty for latest release.'
        required: false
        type: string
      force_rebuild:
        description: 'Force rebuild even if the version is already published'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  ONNXRUNTIME_VERSION: "1.17.1"

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      update_needed: ${{ steps.check.outputs.update_needed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for new sherpa-onnx release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CURRENT=$(cat versions/current-version.txt 2>/dev/null || echo "0.0.0")
          echo "Current version: $CURRENT"

          if [[ -n "${{ inputs.sherpa_onnx_version }}" ]]; then
            TARGET="${{ inputs.sherpa_onnx_version }}"
            echo "Manual version specified: $TARGET"
          else
            TARGET=$(gh api repos/k2-fsa/sherpa-onnx/releases/latest --jq '.tag_name' | sed 's/^v//')
            echo "Latest release: $TARGET"
          fi

          if [[ "$CURRENT" != "$TARGET" ]] || [[ "${{ inputs.force_rebuild }}" == "true" ]]; then
            echo "update_needed=true" >> "$GITHUB_OUTPUT"
            echo "version=$TARGET" >> "$GITHUB_OUTPUT"
            echo "Update needed: $CURRENT -> $TARGET"
          else
            echo "update_needed=false" >> "$GITHUB_OUTPUT"
            echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "Already up to date: $CURRENT"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.update_needed == 'true'
    runs-on: macos-14
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake wget

      - name: Clone sherpa-onnx
        run: git clone --depth 1 --branch "v${VERSION}" https://github.com/k2-fsa/sherpa-onnx.git /tmp/sherpa-onnx

      # ── iOS Build ──────────────────────────────────────────────
      - name: Build iOS sherpa-onnx
        run: |
          cd /tmp/sherpa-onnx
          export CMAKE_VERBOSE_MAKEFILE=ON
          bash build-ios.sh

      - name: Install iOS headers
        run: |
          cd /tmp/sherpa-onnx/build-ios
          cmake --build build/os64 --target install

      # ── macOS Build ────────────────────────────────────────────
      - name: Build macOS sherpa-onnx (universal2)
        run: |
          cd /tmp/sherpa-onnx
          mkdir -p build-macos && cd build-macos

          cmake \
            -DSHERPA_ONNX_ENABLE_BINARY=OFF \
            -DSHERPA_ONNX_BUILD_C_API_EXAMPLES=OFF \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_INSTALL_PREFIX=./install \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DSHERPA_ONNX_ENABLE_PYTHON=OFF \
            -DSHERPA_ONNX_ENABLE_TESTS=OFF \
            -DSHERPA_ONNX_ENABLE_CHECK=OFF \
            -DSHERPA_ONNX_ENABLE_PORTAUDIO=OFF \
            -DSHERPA_ONNX_ENABLE_JNI=OFF \
            -DSHERPA_ONNX_ENABLE_C_API=ON \
            -DSHERPA_ONNX_ENABLE_WEBSOCKET=OFF \
            ../

          make -j4
          make install
          rm -fv ./install/include/cargs.h

          libtool -static -o ./install/lib/libsherpa-onnx.a \
            ./install/lib/libsherpa-onnx-c-api.a \
            ./install/lib/libsherpa-onnx-core.a \
            ./install/lib/libkaldi-native-fbank-core.a \
            ./install/lib/libkissfft-float.a \
            ./install/lib/libsherpa-onnx-fstfar.a \
            ./install/lib/libsherpa-onnx-fst.a \
            ./install/lib/libsherpa-onnx-kaldifst-core.a \
            ./install/lib/libkaldi-decoder-core.a \
            ./install/lib/libucd.a \
            ./install/lib/libpiper_phonemize.a \
            ./install/lib/libespeak-ng.a \
            ./install/lib/libssentencepiece_core.a

      # ── Create unified sherpa-onnx.xcframework ────────────────
      - name: Create unified sherpa-onnx.xcframework (iOS + macOS)
        run: |
          cd /tmp/sherpa-onnx

          # iOS simulator: lipo arm64 + x86_64
          mkdir -p build-ios/build/simulator/lib
          for f in libkaldi-native-fbank-core.a libkissfft-float.a libsherpa-onnx-c-api.a libsherpa-onnx-core.a \
                   libsherpa-onnx-fstfar.a libssentencepiece_core.a \
                   libsherpa-onnx-fst.a libsherpa-onnx-kaldifst-core.a libkaldi-decoder-core.a \
                   libucd.a libpiper_phonemize.a libespeak-ng.a; do
            lipo -create build-ios/build/simulator_arm64/lib/${f} \
                         build-ios/build/simulator_x86_64/lib/${f} \
                 -output build-ios/build/simulator/lib/${f}
          done

          libtool -static -o build-ios/build/simulator/libsherpa-onnx.a \
            build-ios/build/simulator/lib/libkaldi-native-fbank-core.a \
            build-ios/build/simulator/lib/libkissfft-float.a \
            build-ios/build/simulator/lib/libsherpa-onnx-c-api.a \
            build-ios/build/simulator/lib/libsherpa-onnx-core.a \
            build-ios/build/simulator/lib/libsherpa-onnx-fstfar.a \
            build-ios/build/simulator/lib/libsherpa-onnx-fst.a \
            build-ios/build/simulator/lib/libsherpa-onnx-kaldifst-core.a \
            build-ios/build/simulator/lib/libkaldi-decoder-core.a \
            build-ios/build/simulator/lib/libucd.a \
            build-ios/build/simulator/lib/libpiper_phonemize.a \
            build-ios/build/simulator/lib/libespeak-ng.a \
            build-ios/build/simulator/lib/libssentencepiece_core.a

          libtool -static -o build-ios/build/os64/libsherpa-onnx.a \
            build-ios/build/os64/lib/libkaldi-native-fbank-core.a \
            build-ios/build/os64/lib/libkissfft-float.a \
            build-ios/build/os64/lib/libsherpa-onnx-c-api.a \
            build-ios/build/os64/lib/libsherpa-onnx-core.a \
            build-ios/build/os64/lib/libsherpa-onnx-fstfar.a \
            build-ios/build/os64/lib/libsherpa-onnx-fst.a \
            build-ios/build/os64/lib/libsherpa-onnx-kaldifst-core.a \
            build-ios/build/os64/lib/libkaldi-decoder-core.a \
            build-ios/build/os64/lib/libucd.a \
            build-ios/build/os64/lib/libpiper_phonemize.a \
            build-ios/build/os64/lib/libespeak-ng.a \
            build-ios/build/os64/lib/libssentencepiece_core.a

          HEADERS_DIR=/tmp/sherpa-onnx/build-ios/install/include
          mkdir -p "$HEADERS_DIR/sherpa-onnx/c-api"
          cp /tmp/sherpa-onnx/sherpa-onnx/c-api/c-api.h "$HEADERS_DIR/sherpa-onnx/c-api/"

          rm -rf /tmp/unified-sherpa-onnx.xcframework
          xcodebuild -create-xcframework \
            -library build-ios/build/os64/libsherpa-onnx.a \
              -headers "$HEADERS_DIR" \
            -library build-ios/build/simulator/libsherpa-onnx.a \
              -headers "$HEADERS_DIR" \
            -library build-macos/install/lib/libsherpa-onnx.a \
              -headers build-macos/install/include \
            -output /tmp/unified-sherpa-onnx.xcframework

      # ── onnxruntime: iOS + macOS ──────────────────────────────
      - name: Download iOS onnxruntime xcframework
        run: |
          mkdir -p /tmp/onnxruntime-ios
          cd /tmp/onnxruntime-ios
          ORT_VER="${{ env.ONNXRUNTIME_VERSION }}"
          wget -q "https://github.com/csukuangfj/onnxruntime-libs/releases/download/v${ORT_VER}/onnxruntime.xcframework-${ORT_VER}.tar.bz2"
          tar xjf "onnxruntime.xcframework-${ORT_VER}.tar.bz2"
          rm "onnxruntime.xcframework-${ORT_VER}.tar.bz2"

      - name: Download macOS onnxruntime
        run: |
          ORT_VER="${{ env.ONNXRUNTIME_VERSION }}"
          mkdir -p /tmp/onnxruntime-macos
          cd /tmp/onnxruntime-macos
          wget -q "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VER}/onnxruntime-osx-universal2-${ORT_VER}.tgz"
          tar xzf "onnxruntime-osx-universal2-${ORT_VER}.tgz"
          # Rename to consistent dir
          mv "onnxruntime-osx-universal2-${ORT_VER}" onnxruntime

      - name: Create unified onnxruntime.xcframework (iOS + macOS)
        run: |
          # Start with iOS xcframework slices
          cp -RL /tmp/onnxruntime-ios/onnxruntime.xcframework /tmp/onnxruntime-ios.xcframework.tmp

          # Create macOS slice in the xcframework
          SLICE_DIR="/tmp/onnxruntime-ios.xcframework.tmp/macos-arm64_x86_64"
          mkdir -p "$SLICE_DIR"
          cp /tmp/onnxruntime-macos/onnxruntime/lib/libonnxruntime.${{ env.ONNXRUNTIME_VERSION }}.dylib \
             "$SLICE_DIR/libonnxruntime.dylib"
          mkdir -p "$SLICE_DIR/Headers"
          cp /tmp/onnxruntime-macos/onnxruntime/include/*.h "$SLICE_DIR/Headers/"

          # Update Info.plist to include the macOS slice
          python3 "$GITHUB_WORKSPACE/scripts/patch-info-plist.py" \
            /tmp/onnxruntime-ios.xcframework.tmp/Info.plist \
            macos-arm64_x86_64 \
            libonnxruntime.dylib

          mv /tmp/onnxruntime-ios.xcframework.tmp /tmp/unified-onnxruntime.xcframework

      # ── Inject modulemaps ──────────────────────────────────────
      - name: Inject modulemap into sherpa-onnx.xcframework
        run: |
          XCFW_DIR="/tmp/unified-sherpa-onnx.xcframework"
          for slice_dir in "$XCFW_DIR"/*/; do
            headers_dir="${slice_dir}Headers"
            if [[ -d "$headers_dir" ]]; then
              cat > "${headers_dir}/module.modulemap" << 'MODULEMAP'
          module sherpa_onnx {
              header "sherpa-onnx/c-api/c-api.h"
              export *
          }
          MODULEMAP
              echo "Injected modulemap into: ${headers_dir}"
            fi
          done

      - name: Inject modulemap into onnxruntime.xcframework
        run: |
          XCFW_DIR="/tmp/unified-onnxruntime.xcframework"

          # Top-level shared Headers directory
          ONNX_HEADERS_DIR="${XCFW_DIR}/Headers"
          if [[ -d "$ONNX_HEADERS_DIR" && ! -f "${ONNX_HEADERS_DIR}/module.modulemap" ]]; then
            cat > "${ONNX_HEADERS_DIR}/module.modulemap" << 'MODULEMAP'
          module onnxruntime {
              header "onnxruntime_c_api.h"
              export *
          }
          MODULEMAP
            echo "Injected modulemap into: ${ONNX_HEADERS_DIR}"
          fi

          # Per-slice Headers directories
          for slice_dir in "$XCFW_DIR"/*/; do
            slice_name="$(basename "$slice_dir")"
            if [[ "$slice_name" != "Headers" && -d "${slice_dir}Headers" ]]; then
              if [[ ! -f "${slice_dir}Headers/module.modulemap" ]]; then
                cat > "${slice_dir}Headers/module.modulemap" << 'MODULEMAP'
          module onnxruntime {
              header "onnxruntime_c_api.h"
              export *
          }
          MODULEMAP
                echo "Injected modulemap into: ${slice_dir}Headers"
              fi
            fi
          done

      # ── Package ────────────────────────────────────────────────
      - name: Package xcframeworks
        run: |
          cd /tmp
          zip -ry sherpa-onnx.xcframework.zip unified-sherpa-onnx.xcframework/
          zip -ry onnxruntime.xcframework.zip unified-onnxruntime.xcframework/

          echo "CHECKSUM_SHERPA=$(swift package compute-checksum /tmp/sherpa-onnx.xcframework.zip)" >> "$GITHUB_ENV"
          echo "CHECKSUM_ONNXRUNTIME=$(swift package compute-checksum /tmp/onnxruntime.xcframework.zip)" >> "$GITHUB_ENV"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xcframeworks
          path: |
            /tmp/sherpa-onnx.xcframework.zip
            /tmp/onnxruntime.xcframework.zip
          retention-days: 1

      - name: Save checksums
        run: |
          echo "$CHECKSUM_SHERPA" > /tmp/checksum-sherpa.txt
          echo "$CHECKSUM_ONNXRUNTIME" > /tmp/checksum-onnxruntime.txt

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: |
            /tmp/checksum-sherpa.txt
            /tmp/checksum-onnxruntime.txt
          retention-days: 1

  release:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: xcframeworks
          path: /tmp/xcframeworks

      - name: Download checksums
        uses: actions/download-artifact@v4
        with:
          name: checksums
          path: /tmp/checksums

      - name: Read checksums
        id: checksums
        run: |
          CHECKSUM_SHERPA=$(cat /tmp/checksums/checksum-sherpa.txt)
          CHECKSUM_ONNXRUNTIME=$(cat /tmp/checksums/checksum-onnxruntime.txt)
          echo "sherpa=$CHECKSUM_SHERPA" >> "$GITHUB_OUTPUT"
          echo "onnxruntime=$CHECKSUM_ONNXRUNTIME" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        run: |
          gh release delete "${VERSION}" --yes 2>/dev/null || true
          git push origin --delete "${VERSION}" 2>/dev/null || true

          SHERPA_ZIP=$(find /tmp/xcframeworks -name "sherpa-onnx.xcframework.zip" | head -1)
          ONNX_ZIP=$(find /tmp/xcframeworks -name "onnxruntime.xcframework.zip" | head -1)

          gh release create "${VERSION}" \
            --title "sherpa-onnx v${VERSION}" \
            --notes "Pre-built XCFrameworks (iOS + macOS) for sherpa-onnx v${VERSION}

          ## Platforms
          - iOS 13.0+ (arm64 device, arm64/x86_64 simulator)
          - macOS 13.0+ (arm64, x86_64)

          ## Checksums (SHA-256)
          - \`sherpa-onnx.xcframework.zip\`: \`${{ steps.checksums.outputs.sherpa }}\`
          - \`onnxruntime.xcframework.zip\`: \`${{ steps.checksums.outputs.onnxruntime }}\`
          " \
            "$SHERPA_ZIP" \
            "$ONNX_ZIP"

      - name: Update Package.swift
        run: |
          CHECKSUM_SHERPA="${{ steps.checksums.outputs.sherpa }}"
          CHECKSUM_ONNXRUNTIME="${{ steps.checksums.outputs.onnxruntime }}"

          sed -i "s|^let version = \".*\"|let version = \"${VERSION}\"|" Package.swift
          sed -i "s|^let checksumSherpaOnnx = \".*\"|let checksumSherpaOnnx = \"${CHECKSUM_SHERPA}\"|" Package.swift
          sed -i "s|^let checksumOnnxRuntime = \".*\"|let checksumOnnxRuntime = \"${CHECKSUM_ONNXRUNTIME}\"|" Package.swift

          echo "${VERSION}" > versions/current-version.txt

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift versions/current-version.txt
          git commit -m "Update to sherpa-onnx v${VERSION} (iOS + macOS)"
          git push
